services:
  db:
    image: postgres:15-alpine
    container_name: event_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-event_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-event_password}
      POSTGRES_DB: ${POSTGRES_DB:-event_management}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: event_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret_redis}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    build:
      context: .
      target: runner
    container_name: event_api
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file: .env
    environment:
      # Override local .env connections to point to internal Docker networks
      - DATABASE_URL=postgresql://${POSTGRES_USER:-event_user}:${POSTGRES_PASSWORD:-event_password}@db:5432/${POSTGRES_DB:-event_management}?schema=public&connection_limit=10
      - REDIS_URL=redis://${REDIS_USER:-}:${REDIS_PASSWORD:-secret_redis}@redis:6379
      - RUN_MIGRATIONS=true
      - NODE_OPTIONS=--max-old-space-size=400
    command: ["node", "dist/server.js"]
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: .
      target: runner
    container_name: event_worker
    restart: always
    depends_on:
      - db
      - redis
    env_file: .env
    environment:
      # Override local .env connections to point to internal Docker networks
      - DATABASE_URL=postgresql://${POSTGRES_USER:-event_user}:${POSTGRES_PASSWORD:-event_password}@db:5432/${POSTGRES_DB:-event_management}?schema=public&connection_limit=10
      - REDIS_URL=redis://${REDIS_USER:-}:${REDIS_PASSWORD:-secret_redis}@redis:6379
      - NODE_OPTIONS=--max-old-space-size=400
    command: ["node", "dist/workers/index.js"]
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
