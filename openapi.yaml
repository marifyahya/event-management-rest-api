openapi: 3.0.3
info:
  title: Event Organizer REST API
  description: REST API for event management, attendee registration, ticketing, check-in, and payments.
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: localhost
    description: Relative URL for local development
security:
  - BearerAuth: []
paths:
  /:
    get:
      summary: Root Endpoint
      description: Returns a welcome message.
      operationId: getRoot
      security: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Welcome to API Auth Express

  /api/health:
    get:
      summary: Health Check
      description: Returns API working status and timestamp.
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: API is working
                  timestamp:
                    type: string
                    format: date-time
                    example: '2026-06-08T09:00:00.000Z'

  /api/auth/register:
    post:
      summary: User Registration
      description: Registers a new attendee/user.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - email
                - password
              properties:
                fullName:
                  type: string
                  minLength: 3
                  maxLength: 50
                  example: John Doe
                email:
                  type: string
                  format: email
                  maxLength: 100
                  example: john@example.com
                password:
                  type: string
                  minLength: 6
                  maxLength: 16
                  example: password123
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User registered successfully
                  data:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Validation failed or email already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Email already exists
                  errors:
                    type: object
                    example: { email: ['Invalid email format'] }
        '429':
          $ref: '#/components/responses/TooManyAuthRequests'

  /api/auth/login:
    post:
      summary: User Login
      description: Authenticates user and returns JWT token.
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 100
                  example: admin@example.com
                password:
                  type: string
                  minLength: 6
                  maxLength: 16
                  example: password
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login successful
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          description: Invalid input or credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Invalid email or password
                  errors:
                    type: object
        '429':
          $ref: '#/components/responses/TooManyAuthRequests'

  /api/auth/me:
    get:
      summary: Get Authenticated User Profile
      description: Returns profile details of currently logged-in user.
      operationId: getProfile
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/auth/logout:
    post:
      summary: Logout User
      description: Logs out the current user session.
      operationId: logoutUser
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Logout successful
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/users:
    get:
      summary: List Users (Admin only)
      description: Retrieves a list of users with optional filtering.
      operationId: listUsers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: name
          in: query
          schema:
            type: string
        - name: email
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: string
            enum: ['true', 'false']
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Users retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      summary: Create User (Admin only)
      description: Creates a new administrative or staff account.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - email
                - password
              properties:
                fullName:
                  type: string
                  minLength: 3
                  maxLength: 50
                  example: Staff Name
                email:
                  type: string
                  format: email
                  maxLength: 100
                  example: staff@example.com
                password:
                  type: string
                  minLength: 6
                  maxLength: 16
                  example: password123
                role:
                  type: string
                  enum: [admin, staff]
                  default: staff
                isActive:
                  type: boolean
                  default: true
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User created successfully
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation failed or email already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Email already exists
                  errors:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
    get:
      summary: Get User Detail (Admin only)
      operationId: getUser
      responses:
        '200':
          description: User found successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User retrieved successfully
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update User (Admin only)
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  minLength: 3
                  maxLength: 50
                email:
                  type: string
                  format: email
                  maxLength: 100
                password:
                  type: string
                  minLength: 6
                  maxLength: 16
                role:
                  type: string
                  enum: [admin, staff]
                isActive:
                  type: boolean
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User updated successfully
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete User (Admin only)
      operationId: deleteUser
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/events:
    get:
      summary: List Events for Admin/Organizer
      operationId: listAdminEvents
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: title
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, PUBLISHED, CANCELLED, ARCHIVED]
      responses:
        '200':
          description: Events retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Events retrieved successfully
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create Event
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - capacity
                - price
                - location
                - startAt
                - endAt
              properties:
                title:
                  type: string
                  minLength: 5
                  maxLength: 100
                  example: Tech Conference 2026
                description:
                  type: string
                  maxLength: 500
                  example: Conference description
                capacity:
                  type: integer
                  minimum: 1
                  example: 300
                price:
                  type: integer
                  minimum: 1
                  example: 75000
                category:
                  type: string
                  maxLength: 100
                  example: technology
                location:
                  type: string
                  maxLength: 200
                  example: Jakarta
                startAt:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}$'
                  example: '2026-09-15 15:00'
                endAt:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}$'
                  example: '2026-09-15 18:00'
      responses:
        '201':
          description: Event created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Event created successfully
                  data:
                    type: object
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/admin/events/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
    get:
      summary: Get Event Detail
      operationId: getAdminEvent
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Event retrieved successfully
                  data:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update Event (Draft only)
      operationId: updateEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 5
                  maxLength: 100
                description:
                  type: string
                  maxLength: 500
                capacity:
                  type: integer
                  minimum: 1
                price:
                  type: integer
                  minimum: 1
                category:
                  type: string
                  maxLength: 100
                location:
                  type: string
                  maxLength: 200
                startAt:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}$'
                  example: '2026-09-15 15:00'
                endAt:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}$'
                  example: '2026-09-15 18:00'
      responses:
        '200':
          description: Event updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Event updated successfully
                  data:
                    type: object
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      summary: Delete Event (Archived only)
      operationId: deleteEvent
      responses:
        '200':
          description: Event deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Event deleted successfully
        '400':
          $ref: '#/components/responses/BadRequestAppError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/events/{id}/publish:
    post:
      summary: Publish Event
      operationId: publishEvent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Event published successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Event published successfully
                  data:
                    type: object
        '400':
          $ref: '#/components/responses/BadRequestAppError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/events/{id}/cancel:
    post:
      summary: Cancel Event
      operationId: cancelEvent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 120
                  example: Event cancelled due to heavy rain.
      responses:
        '200':
          description: Event cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Event cancelled successfully
                  data:
                    type: object
        '400':
          description: ValidationError or BadRequestAppError
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/events/{id}/move-to-draft:
    post:
      summary: Move Event to Draft
      operationId: moveEventToDraft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Event moved to draft successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Event moved to draft successfully
                  data:
                    type: object
        '400':
          $ref: '#/components/responses/BadRequestAppError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/events/{id}/archive:
    post:
      summary: Archive Event
      operationId: archiveEvent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Event archived successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Event archived successfully
                  data:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/events/{id}/stats:
    get:
      summary: Get Event Statistics
      description: Returns specific metrics for a single event.
      operationId: getEventStats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Event statistics fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Event statistics fetched successfully
                  data:
                    type: object
                    properties:
                      financial:
                        type: object
                        properties:
                          totalRevenue:
                            type: number
                            example: 50000000
                      ticketing:
                        type: object
                        properties:
                          capacity:
                            type: number
                            example: 1000
                          totalTicketsSold:
                            type: number
                            example: 850
                          remainingCapacity:
                            type: number
                            example: 150
                      attendance:
                        type: object
                        properties:
                          totalCheckIns:
                            type: number
                            example: 600
                          attendanceRate:
                            type: number
                            example: 70.59
                      orders:
                        type: object
                        properties:
                          paid:
                            type: number
                            example: 850
                          pending:
                            type: number
                            example: 50
                          expired:
                            type: number
                            example: 20
                          cancelled:
                            type: number
                            example: 5
                          total:
                            type: number
                            example: 925
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/events:
    get:
      summary: List Public Published Events
      description: Publicly lists active, published events.
      operationId: listPublicEvents
      security: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: title
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Events retrieved successfully
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/events/{id}:
    get:
      summary: Get Public Event Detail
      operationId: getPublicEvent
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Event retrieved successfully
                  data:
                    type: object
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orders:
    post:
      summary: Create Order / Ticket Purchase
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventId
                - quantity
                - paymentMethod
              properties:
                eventId:
                  type: integer
                  example: 1
                quantity:
                  type: integer
                  minimum: 1
                  maximum: 6
                  example: 2
                paymentMethod:
                  type: string
                  example: BCA_VA
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Event purchased successfully
                  data:
                    type: object
        '400':
          description: ValidationError or BadRequestAppError (e.g. sold out)
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/orders/{id}:
    get:
      summary: Get Order Detail
      operationId: getOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Order found successfully
                  data:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payments/webhook:
    post:
      summary: Payment Webhook Callback
      description: Ingests webhook callback notifications from the payment gateway provider.
      operationId: paymentWebhook
      security: []
      parameters:
        - name: x-callback-token
          in: header
          required: false
          schema:
            type: string
        - name: x-signature
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook response (always 200 with success true/false inside body)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

  /api/admin/dashboard:
    get:
      summary: Admin Dashboard Summary
      description: Returns overall metrics for admin dashboard including revenues and orders.
      operationId: getAdminDashboardSummary
      tags:
        - Admin Dashboard
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Dashboard data fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Dashboard data fetched successfully
                  data:
                    type: object
                    properties:
                      totalRevenue:
                        type: number
                        example: 5000000
                      totalOrder:
                        type: number
                        example: 100
                      totalTicket:
                        type: number
                        example: 350
                      totalActiveEvents:
                        type: number
                        example: 5
                      totalEvents:
                        type: number
                        example: 12
                      totalOrderPaid:
                        type: number
                        example: 80
                      totalOrderPending:
                        type: number
                        example: 15
                      totalOrderExpired:
                        type: number
                        example: 5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/check-ins:
    post:
      summary: Check In Ticket / QR Code
      operationId: checkInTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - qrToken
              properties:
                qrToken:
                  type: string
                  minLength: 1
                  example: '271d80340acf628cb30cdb8fe64f3277'
      responses:
        '200':
          description: Check-in successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Check-in successful!
                  data:
                    type: object
                    properties:
                      ticketCode:
                        type: string
                        example: TCK-12345
                      eventName:
                        type: string
                        example: Tech Conference 2026
                      attendeeName:
                        type: string
                        example: John Doe
                      checkedInAt:
                        type: string
                        format: date-time
                        example: '2026-06-08T09:00:00.000Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ValidationError:
      description: Validation Failed
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: The given data was invalid.
              errors:
                type: object
    BadRequestAppError:
      description: Bad Request / Operation Constraint Violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppErrorResponse'
    Unauthorized:
      description: Unauthorized / Missing or Invalid Token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppErrorResponse'
    Forbidden:
      description: Forbidden / Insufficient Permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppErrorResponse'
    NotFound:
      description: Resource Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppErrorResponse'
    Conflict:
      description: Conflict / State Constraint Violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppErrorResponse'
    TooManyRequests:
      description: Too Many Requests / Rate Limit Exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppErrorResponse'
    TooManyAuthRequests:
      description: Too Many Auth Requests / Rate Limit Exceeded
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Too many login attempts. Please try again after 15 minutes.
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        fullName:
          type: string
          example: John Doe
        email:
          type: string
          example: john@example.com
        role:
          type: string
          example: user
        isActive:
          type: boolean
          example: true
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 45
    AppErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
              example: Error message detail
            timestamp:
              type: string
              format: date-time
